# =============================================================================
# PCF — Policy Control Function
# Provides QoS policy decisions. SMF queries PCF for subscriber policies.
# Registers with NRF for discovery.
# =============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: pcf
  namespace: demo-5g
  labels:
    app: pcf
    nf-type: pcf
spec:
  replicas: 1
  selector:
    matchLabels:
      app: pcf
  template:
    metadata:
      labels:
        app: pcf
        nf-type: pcf
    spec:
      nodeSelector:
        role: app
      containers:
        - name: pcf
          image: python:3.12-slim
          command:
            - python
            - -c
            - |
              import http.server, json, threading, time, os, urllib.request

              NRF_ENDPOINT = os.environ.get("NRF_ENDPOINT", "http://nrf:8080")
              NF_INSTANCE_ID = os.environ.get("HOSTNAME", "pcf-unknown")

              policy_decisions = 0

              def register_with_nrf():
                  payload = json.dumps({
                      "nfType": "PCF",
                      "nfInstanceId": NF_INSTANCE_ID,
                      "nfStatus": "REGISTERED",
                      "ipv4Addresses": ["pcf:8080"],
                      "fqdn": "pcf.demo-5g.svc.cluster.local"
                  }).encode()
                  for attempt in range(30):
                      try:
                          req = urllib.request.Request(f"{NRF_ENDPOINT}/nnrf-nfm/v1/nf-instances",
                                                      data=payload, headers={"Content-Type": "application/json"}, method="POST")
                          urllib.request.urlopen(req, timeout=5)
                          print(f"INFO: PCF registered with NRF | instance={NF_INSTANCE_ID}", flush=True)
                          return
                      except Exception as e:
                          print(f"WARN: PCF NRF registration attempt {attempt+1}/30 failed: {e}", flush=True)
                          time.sleep(5)
                  print(f"ERROR: PCF failed to register with NRF after 30 attempts", flush=True)

              class Handler(http.server.BaseHTTPRequestHandler):
                  def do_POST(self):
                      global policy_decisions

                      if self.path == "/npcf-smpolicycontrol/v1/sm-policies":
                          # SM Policy Create (from SMF)
                          length = int(self.headers.get("Content-Length", 0))
                          body = json.loads(self.rfile.read(length)) if length else {}
                          supi = body.get("supi", "unknown")
                          dnn = body.get("dnn", "internet")

                          policy_decisions += 1

                          # Return canned QoS policy
                          policy = {
                              "policyDecisionId": f"pd-{policy_decisions:06d}",
                              "supi": supi,
                              "dnn": dnn,
                              "sessRules": {"sr1": {"authSessAmbr": {"uplink": "100 Mbps", "downlink": "200 Mbps"}, "authDefQos": {"5qi": 9, "arp": {"priorityLevel": 8}}}},
                              "pccRules": {}
                          }
                          print(f"INFO: Policy decision created | policy-id=pd-{policy_decisions:06d} | SUPI={supi} | DNN={dnn} | 5QI=9 | AMBR=100/200 Mbps", flush=True)
                          self.send_response(201)
                          self.end_headers()
                          self.wfile.write(json.dumps(policy).encode())
                          return

                      self.send_response(404)
                      self.end_headers()

                  def do_GET(self):
                      if self.path == "/health":
                          self.send_response(200)
                          self.end_headers()
                          self.wfile.write(json.dumps({
                              "status": "healthy",
                              "nfType": "PCF",
                              "instance": NF_INSTANCE_ID,
                              "policyDecisions": policy_decisions
                          }).encode())
                          return
                      self.send_response(404)
                      self.end_headers()

                  def log_message(self, format, *args): pass

              print(f"INFO: PCF starting | instance={NF_INSTANCE_ID}", flush=True)
              threading.Thread(target=register_with_nrf, daemon=True).start()
              print(f"INFO: PCF ready - serving policy decisions", flush=True)
              http.server.HTTPServer(("", 8080), Handler).serve_forever()
          ports:
            - containerPort: 8080
          resources:
            requests:
              cpu: 64m
              memory: 64Mi
            limits:
              cpu: 128m
              memory: 128Mi
          env:
            - name: NRF_ENDPOINT
              valueFrom:
                configMapKeyRef:
                  name: core-config
                  key: nrf-endpoint
          livenessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 6
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: pcf
  namespace: demo-5g
spec:
  selector:
    app: pcf
  ports:
    - port: 8080
      targetPort: 8080
  type: ClusterIP
