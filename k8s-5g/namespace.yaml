apiVersion: v1
kind: Namespace
metadata:
  name: demo-5g
  labels:
    app.kubernetes.io/part-of: 5g-core-demo
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: core-config
  namespace: demo-5g
data:
  # UPDATE after terraform apply (same Redis/SQS from existing infra)
  redis-host: "REPLACE_WITH_REDIS_ENDPOINT"
  redis-port: "6379"
  sqs-queue-url: "REPLACE_WITH_SQS_URL"
  # NF service endpoints (K8s internal)
  nrf-endpoint: "http://nrf:8080"
  amf-endpoint: "http://amf:8080"
  smf-endpoint: "http://smf:8080"
  upf-endpoint: "http://upf:8080"
  pcf-endpoint: "http://pcf:8080"
